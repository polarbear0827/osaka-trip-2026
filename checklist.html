    <meta charset="UTF-8" />

    <title>一起去大阪 | 行李 Checklist</title>
    <link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="index.html#top" aria-label="回到首頁">
        <span class="brand-mark">OS</span>
        <span>一起去大阪</span>
      </a>
      <nav class="nav-links" aria-label="頁面區塊">
        <a href="index.html#planner">行程</a>
        <a href="index.html#stay">住宿</a>
        <a href="index.html#food">吃法</a>
        <a href="map.html">地圖</a>
        <a href="checklist.html">行李</a>
        <a href="japanese.html">日文</a>
      </nav>
    </header>

    <main class="subpage">
      <section class="page-hero compact-hero">
        <p class="date-line">PACKING LIST</p>
        <h1>行李少一點，胃留多一點。</h1>
        <p class="lead">後三晚房內有洗衣機、廚房、冰箱和微波爐，所以衣服不用帶滿；但奈良、teamLab、泡湯都需要好走和好整理。</p>
      </section>

      <section class="section checklist-section">
        <div class="check-grid">
          <article>
            <h2>必帶</h2>
            <label><input type="checkbox" /> 護照、機票、訂房截圖</label>
            <label><input type="checkbox" /> Suica / ICOCA 或手機交通卡</label>
            <label><input type="checkbox" /> 信用卡 + 少量現金</label>
            <label><input type="checkbox" /> 行動電源、充電線、轉接頭</label>
            <label><input type="checkbox" /> 常備藥、腸胃藥、止痛藥</label>
            <label><input type="checkbox" /> USJ 門票 QR Code、官方 App、整理券提醒</label>
          </article>
          <article>
            <h2>衣物</h2>
            <label><input type="checkbox" /> 好走的鞋，奈良和 teamLab 都靠它</label>
            <label><input type="checkbox" /> 薄外套或可分層保暖衣</label>
            <label><input type="checkbox" /> 3 天份內衣褲，後面洗衣</label>
            <label><input type="checkbox" /> 襪子多一雙，市場和雨天備用</label>
            <label><input type="checkbox" /> 泡湯後可穿的輕便衣物</label>
          </article>
          <article>
            <h2>市場與住宿</h2>
            <label><input type="checkbox" /> 可折購物袋</label>
            <label><input type="checkbox" /> 小夾鏈袋，裝市場小食或藥品</label>
            <label><input type="checkbox" /> 洗衣膠囊或小包洗衣精</label>
            <label><input type="checkbox" /> 保溫杯或水瓶</label>
            <label><input type="checkbox" /> 濕紙巾、面紙、酒精棉片</label>
          </article>
          <article>
            <h2>當天小包</h2>
            <label><input type="checkbox" /> 護照影本或照片</label>
            <label><input type="checkbox" /> 零錢包</label>
            <label><input type="checkbox" /> 折疊傘</label>
            <label><input type="checkbox" /> 暖暖包</label>
            <label><input type="checkbox" /> teamLab 夜間戶外用小手電或手機電量</label>
            <label><input type="checkbox" /> USJ 日用輕便雨衣或防水袋</label>
          </article>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <span>Made for 13E / 13F</span>
      <div class="footer-links">
        <a href="index.html">首頁</a>
        <a href="map.html">交通地圖</a>
        <a href="japanese.html">簡易日文</a>
      </div>
    </footer>
  </body>
</html>
